<html lang="fr">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <title>Accès Protégé</title>
  <style>
    body {
      margin: 0;
      padding: 0;
      background-color: #050505;
      color: #fff;
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      height: 100vh;
      text-align: center;
    }
    .container {
      max-width: 400px;
      padding: 2rem;
      background: rgba(20, 20, 20, 0.8);
      border: 1px solid rgba(255, 255, 255, 0.1);
      border-radius: 12px;
      box-shadow: 0 10px 30px rgba(0,0,0,0.5);
      backdrop-filter: blur(10px);
      -webkit-backdrop-filter: blur(10px);
    }
    h1 {
      font-size: 1.2rem;
      font-weight: 400;
      letter-spacing: 2px;
      margin-bottom: 2rem;
      text-transform: uppercase;
      color: #aaa;
    }
    input {
      width: 100%;
      padding: 12px 16px;
      margin-bottom: 1rem;
      background: rgba(0,0,0,0.3);
      border: 1px solid rgba(255,255,255,0.2);
      border-radius: 6px;
      color: #fff;
      font-size: 1rem;
      box-sizing: border-box;
      outline: none;
      transition: border-color 0.3s;
      text-align: center;
    }
    input:focus {
      border-color: #fff;
    }
    button {
      width: 100%;
      padding: 12px;
      background: #fff;
      color: #000;
      border: none;
      border-radius: 6px;
      font-size: 1rem;
      font-weight: 500;
      cursor: pointer;
      transition: opacity 0.3s;
    }
    button:hover {
      opacity: 0.8;
    }
    .error {
      color: #ff4a4a;
      font-size: 0.85rem;
      margin-top: 1rem;
      min-height: 1.2em;
      opacity: 0;
      transition: opacity 0.3s;
    }
    .error.visible {
      opacity: 1;
    }
  </style>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/crypto-js/4.1.1/crypto-js.min.js"></script>
</head>

      <button type="submit">Déverrouiller</button>
      <div class="error" id="error-msg">Mot de passe incorrect.</div>
    </form>
  </div>

    document.getElementById('unlock-form').addEventListener('submit', function(e) {
      e.preventDefault();
      const pass = document.getElementById('pass').value;
      const errorMsg = document.getElementById('error-msg');
      
      try {
        const decrypted = CryptoJS.AES.decrypt(encryptedData, pass);
        const htmlContent = decrypted.toString(CryptoJS.enc.Utf8);
        
        if (htmlContent.length > 0) {
          // Success: write the decrypted HTML to the document
          document.open();
          document.write(htmlContent);
          document.close();
        } else {
          throw new Error('Invalid password');
        }
      } catch (err) {
        errorMsg.classList.add('visible');
        setTimeout(() => errorMsg.classList.remove('visible'), 2000);
      }
    });
  </script>
