<html lang="fr">
<head>

  <!-- JSON-LD Structured Data -->

  {
    "@context": "https://schema.org",
    "@type": "WebSite",
    "name": "Spreadsheet Platform",
    "url": "https://mahebrizion.fr/spreadsheet",

    "potentialAction": {

  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link rel="preconnect" href="https://cdn.jsdelivr.net" crossorigin />
  <!-- Non-blocking font load: load as print then swap to all -->
  <link rel="preload" as="style" href="https://fonts.googleapis.com/css2?family=Syne:wght@400;500;700;800&family=Inter:wght@300;400;500;600&display=swap" />
  <link href="https://fonts.googleapis.com/css2?family=Syne:wght@400;500;700;800&family=Inter:wght@300;400;500;600&display=swap" rel="stylesheet" media="print" onload="this.media='all'" />
  <noscript><link href="https://fonts.googleapis.com/css2?family=Syne:wght@400;500;700;800&family=Inter:wght@300;400;500;600&display=swap" rel="stylesheet" /></noscript>

  <link rel="stylesheet" href="/assets/css/main.css" />
  
  <style>
    .spreadsheet-hero {
      position: relative;
      padding: clamp(100px, 15vw, 180px) clamp(24px, 5vw, 80px) clamp(60px, 8vw, 100px);
      text-align: center;
      overflow: hidden;
      min-height: 40vh;
      display: flex;
      flex-direction: column;
      justify-content: center;
      align-items: center;
      z-index: 2;
    }

    .spreadsheet-title {
      font-family: var(--font-d);
      font-size: clamp(2rem, 10vw, 7rem);
      font-weight: 800;
      line-height: 1.05;
      letter-spacing: -0.03em;
      margin-bottom: 24px;
      color: var(--white);
      word-break: break-word;
      overflow-wrap: anywhere;
    }
    
    .spreadsheet-title .accent {
      color: var(--accent);
    }

    .shoes-grid {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(350px, 1fr));
      gap: 30px;
      padding: 0 clamp(24px, 5vw, 80px) clamp(100px, 10vw, 160px);
      max-width: 1360px;
      margin: 0 auto;
      position: relative;
      z-index: 2;
    }

    .spread-card {
      background: rgba(255, 255, 255, 0.02);
      border: 1px solid rgba(255, 255, 255, 0.06);
      border-radius: 12px;
      padding: 40px 32px;
      transition: all 0.4s var(--ease-out);
      position: relative;
      overflow: hidden;
      display: flex;
      flex-direction: column;
      text-decoration: none;
      backdrop-filter: blur(10px);
    }

    .spread-card::before {
      content: "";
      position: absolute;
      top: 0; left: 0; width: 100%; height: 100%;
      background: radial-gradient(circle at top right, rgba(200, 255, 87, 0.1), transparent 50%);
      opacity: 0;
      transition: opacity 0.5s var(--ease-out);
      pointer-events: none;
    }

    .spread-card:hover {
      transform: translateY(-8px);
      border-color: rgba(200, 255, 87, 0.3);
      background: rgba(255, 255, 255, 0.04);
      box-shadow: 0 20px 40px rgba(0, 0, 0, 0.4), 0 0 20px rgba(200, 255, 87, 0.05);
    }

    .spread-card:hover::before {
      opacity: 1;
    }

    .spread-card-title {
      font-family: var(--font-d);
      font-size: 2rem;
      font-weight: 800;
      color: var(--white);
      margin-bottom: 16px;
      line-height: 1.1;
      letter-spacing: -0.02em;
    }

    .spread-card-desc {
      font-size: 1rem;
      color: var(--grey-4);
      line-height: 1.7;
      margin-bottom: 30px;
      display: -webkit-box;
      -webkit-line-clamp: 3;
      -webkit-box-orient: vertical;
      overflow: hidden;
    }

    .spread-card-arrow {
      margin-top: auto;
      align-self: flex-start;
      color: var(--accent);
      background: rgba(200, 255, 87, 0.1);
      width: 44px; height: 44px;
      border-radius: 50%;
      display: flex; justify-content: center; align-items: center;
      transition: all 0.3s var(--ease-out);
    }

    .spread-card:hover .spread-card-arrow {
      background: var(--accent);
      color: var(--black);
      transform: rotate(-45deg);
    }

    .spread-card-arrow svg {
      width: 20px; height: 20px;
    }

    /* ambient background for spreadsheet */
    .spread-ambient {
      position: fixed;
      inset: 0;
      pointer-events: none;
      z-index: 0;
      overflow: hidden;
    }
    .spread-orb-1 {
      position: absolute;
      width: 60vw;
      height: 60vw;
      top: -20%;
      left: -10%;
      background: radial-gradient(circle, rgba(200, 255, 87, 0.05) 0, transparent 60%);
      filter: blur(80px);
      border-radius: 50%;
    }
    .spread-orb-2 {
      position: absolute;
      width: 50vw;
      height: 50vw;
      bottom: -10%;
      right: -10%;
      background: radial-gradient(circle, rgba(200, 255, 87, 0.03) 0, transparent 60%);
      filter: blur(80px);
      border-radius: 50%;
    }

    /* Mobile Optimization for Spreadsheet Index */
    @media (max-width: 600px) {
      .spreadsheet-hero {
        padding: clamp(80px, 12vw, 120px) 20px clamp(40px, 8vw, 60px);
        min-height: 30vh;
      }
      .shoes-grid {
        grid-template-columns: 1fr;
        padding: 0 16px clamp(60px, 10vw, 100px);
        gap: 20px;
      }
      .spread-card {
        padding: 30px 24px;
      }
      .spread-card-title {
        font-size: 1.5rem;
      }
      .spread-card-desc {
        font-size: 0.95rem;
      }
    }
    @keyframes pulse {
      0%, 100% { opacity: 0.4; }
      50% { opacity: 0.8; }
    }
  </style>
</head>
<body data-barba="wrapper">
  <!-- GRAIN & CURSOR (Garage Alpin style) -->
  <div id="grain" aria-hidden="true"></div>
  <div id="cursor-dot" aria-hidden="true"></div>
  <div id="cursor-ring" aria-hidden="true"></div>

  <div class="spread-ambient" aria-hidden="true">
    <div class="spread-orb-1"></div>
    <div class="spread-orb-2"></div>
    <div class="hero-grid" aria-hidden="true"></div>
  </div>

  <header role="banner">
    <nav id="nav" aria-label="Navigation principale" class="visible">
      <div class="wrap nav-row">
        <a href="/" class="nav-logo" aria-label="Retour à l'accueil">MB</a>
        <ul class="nav-links" role="list">
          <li role="listitem"><a href="/spreadsheet" class="on">Spreadsheets</a></li>
          <li role="listitem"><a href="/spreadsheet/outils">Outils</a></li>
        </ul>
        <div class="nav-right">
          <div class="nav-status" role="status">
            <span class="nav-dot" aria-hidden="true"></span>
            <span>Disponible</span>
          </div>
        </div>
      </div>
    </nav>

  <main id="main-content">
    <section class="spreadsheet-hero" style="min-height: 35vh; padding-bottom: 40px;">
      <p class="s-label reveal on" data-num="01" aria-hidden="true">Index</p>
      <h1 class="spreadsheet-title reveal on reveal-d1">Les <span class="accent">Spreadsheets</span></h1>
    </section>

    <div class="spread-controls reveal on reveal-d2" style="max-width: 1360px; margin: 0 auto 40px; padding: 0 clamp(24px, 5vw, 80px); display: flex; gap: 20px; flex-wrap: wrap; z-index: 2; position: relative;">
      <div style="flex: 1; min-width: 250px; position: relative;">
        <svg style="position: absolute; left: 16px; top: 50%; transform: translateY(-50%); color: rgba(255,255,255,0.4);" viewBox="0 0 24 24" width="20" height="20" stroke="currentColor" stroke-width="2" fill="none"><circle cx="11" cy="11" r="8"></circle><line x1="21" y1="21" x2="16.65" y2="16.65"></line></svg>
        <input type="text" id="search-spreadsheets" placeholder="Rechercher une spreadsheet..." style="width: 100%; padding: 16px 20px 16px 48px; background: rgba(0,0,0,0.3); border: 1px solid rgba(255,255,255,0.1); border-radius: 16px; color: white; font-size: 1rem; outline: none; transition: all 0.3s;" onfocus="this.style.borderColor='var(--accent)'; this.style.background='rgba(0,0,0,0.5)';" onblur="this.style.borderColor='rgba(255,255,255,0.1)'; this.style.background='rgba(0,0,0,0.3)';" />
      </div>
      <select id="sort-spreadsheets" aria-label="Trier les spreadsheets" style="padding: 16px 20px; background: rgba(0,0,0,0.3); border: 1px solid rgba(255,255,255,0.1); border-radius: 16px; color: white; font-size: 1rem; outline: none; cursor: pointer; transition: all 0.3s;" onfocus="this.style.borderColor='var(--accent)';" onblur="this.style.borderColor='rgba(255,255,255,0.1)';">
        <option value="recent" style="color: black;">Modifié récemment</option>
        <option value="oldest" style="color: black;">Les plus anciens</option>
        <option value="likes" style="color: black;">Les plus populaires</option>
        <option value="az" style="color: black;">De A à Z</option>
      </select>
    </div>

    <div class="shoes-grid reveal on reveal-d2" id="public-spreadsheets-list" style="min-height: 400px;">
      <!-- Skeleton placeholders to prevent CLS -->
      <div style="background: rgba(255,255,255,0.03); border-radius: 20px; height: 250px; animation: pulse 1.5s ease infinite;"></div>
      <div style="background: rgba(255,255,255,0.03); border-radius: 20px; height: 250px; animation: pulse 1.5s ease infinite 0.2s;"></div>
      <div style="background: rgba(255,255,255,0.03); border-radius: 20px; height: 250px; animation: pulse 1.5s ease infinite 0.4s;"></div>
    </div>
  </main>

  <footer role="contentinfo" style="position: relative; z-index: 2; min-height: 80px;">
    <div class="wrap footer-row" style="border-top: 1px solid rgba(255,255,255,0.06); padding-top: 28px;">
      <p class="footer-copy">
        &copy; 2026 <span>Mahé Brizion</span>
      </p>
    </div>
  </footer>

  <script src="/assets/js/main.js" defer></script>
  
  <!-- Supabase & Auth -->
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2" defer></script>
  <script src="/spreadsheet/supabase-config.js" defer></script>
  <script src="/spreadsheet/auth-modal.js" defer></script>

  <!-- Load Public Spreadsheets -->
  <script>
    let allSpreadsheets = [];

    document.addEventListener('DOMContentLoaded', async () => {
      const pathParts = window.location.pathname.split('/').filter(Boolean);
      const isIndex = pathParts.length === 1 && pathParts[0] === 'spreadsheet' || window.location.pathname.endsWith('index.html');
      
      if (!isIndex) return;

      const container = document.getElementById('public-spreadsheets-list');
      if (!window.supabaseClient) {
        container.innerHTML = '<p style="color:red; text-align:center;">Erreur: Supabase non initialisé.</p>';
        return;
      }
      
      const { data: sessionData } = await window.supabaseClient.auth.getSession();
      window.lastSignInAt = sessionData?.session?.user?.last_sign_in_at || null;

      const { data, error } = await window.supabaseClient
        .from('spreadsheets')
        .select('*')
        .eq('visibility', 'public')
        .is('deleted_at', null);

      const { data: profilesData } = await window.supabaseClient.from('profiles').select('id, email, display_name');
      
      if (data && profilesData) {
        data.forEach(s => {
          const ownerProfile = profilesData.find(p => p.id === s.owner_id);
          s.authorName = ownerProfile ? (ownerProfile.display_name || (ownerProfile.email ? ownerProfile.email.split('@')[0] : 'Communauté')) : 'Communauté';
        });
      }

      if (error) {
        container.innerHTML = '<p style="color:red; text-align:center;">Erreur de chargement : ' + error.message + '</p>';
      } else if (data && data.length > 0) {
        allSpreadsheets = data;
        renderSpreadsheets();
      } else {
        container.innerHTML = '<p style="color:var(--text-muted); text-align:center;">Aucune spreadsheet publique pour le moment.</p>';
      }
    });

    function renderSpreadsheets() {
      const container = document.getElementById('public-spreadsheets-list');
      const searchTerm = document.getElementById('search-spreadsheets').value.toLowerCase();
      const sortValue = document.getElementById('sort-spreadsheets').value;

      let filtered = allSpreadsheets.filter(s => 
        s.title.toLowerCase().includes(searchTerm) || 
        (s.description && s.description.toLowerCase().includes(searchTerm)) ||
        s.authorName.toLowerCase().includes(searchTerm)
      );

      filtered.sort((a, b) => {
        if (sortValue === 'recent') {
          return new Date(b.updated_at || b.created_at) - new Date(a.updated_at || a.created_at);
        } else if (sortValue === 'oldest') {
          return new Date(a.created_at) - new Date(b.created_at);
        } else if (sortValue === 'likes') {
          return (b.likes_count || 0) - (a.likes_count || 0);
        } else if (sortValue === 'az') {
          return a.title.localeCompare(b.title);
        }
        return 0;
      });

      if (filtered.length === 0) {
        container.innerHTML = '<p style="color:var(--text-muted); text-align:center;">Aucun résultat trouvé.</p>';
        return;
      }

      // Setup reference for visited spreadsheets tracking
      let visitedData = {};
      try {
        visitedData = JSON.parse(localStorage.getItem('visited_spreadsheets') || '{}');
      } catch(e) {}


      container.innerHTML = '';
      filtered.forEach(s => {
        let itemCount = 0;
        if (s.items) {
          try {
            itemCount = typeof s.items === 'string' ? JSON.parse(s.items).length : s.items.length;
          } catch(e) {}
        }
        
        // Badges logic
        let badgesArray = [];
        const updatedAt = new Date(s.updated_at || s.created_at);
        const daysSinceUpdate = (Date.now() - updatedAt.getTime()) / (1000 * 60 * 60 * 24);
        
        const lastVisitedStr = visitedData[s.slug];
        let isNew = false;
        if (lastVisitedStr) {
           isNew = (updatedAt > new Date(lastVisitedStr));
        } else {
           isNew = (daysSinceUpdate < 14); // unvisited and updated recently
        }
        
        if (isNew) {
           badgesArray.push(`<span style="display:inline-block; background: var(--accent); color: var(--black); padding: 4px 8px; border-radius: 4px; font-size: 0.7rem; font-weight: 800; text-transform: uppercase; letter-spacing: 0.05em; margin-right: 8px; margin-bottom: 12px; box-shadow: 0 0 10px rgba(200,255,87,0.3);">New ✨</span>`);
        } else if (daysSinceUpdate < 7) {
           badgesArray.push(`<span style="display:inline-block; background: rgba(255,255,255,0.1); color: white; padding: 4px 8px; border-radius: 4px; font-size: 0.7rem; font-weight: 700; text-transform: uppercase; letter-spacing: 0.05em; margin-right: 8px; margin-bottom: 12px; border: 1px solid rgba(255,255,255,0.2);">Actif récemment</span>`);
        }
        
        if (s.likes_count >= 5) {
           badgesArray.push(`<span style="display:inline-block; background: rgba(255,75,75,0.15); color: #ff4b4b; padding: 4px 8px; border-radius: 4px; font-size: 0.7rem; font-weight: 700; text-transform: uppercase; letter-spacing: 0.05em; margin-right: 8px; margin-bottom: 12px; border: 1px solid rgba(255,75,75,0.3);">Populaire 🔥</span>`);
        }
        
        const badgesHtml = badgesArray.slice(0, 2).join(''); // 2 badges max
        
        container.innerHTML += `
          <a href="/spreadsheet/${s.slug}" class="spread-card" style="height: 100%; min-height: 250px;">
            <div style="display: flex; flex-wrap: wrap;">${badgesHtml}</div>
            <h2 class="spread-card-title">${s.title}</h2>
            <p class="spread-card-desc">${s.description || 'Une sélection au meilleur prix.'}</p>
            
            <div style="display: flex; justify-content: space-between; align-items: center; margin-top: auto; padding-top: 20px; border-top: 1px solid rgba(255,255,255,0.05);">
              <div style="max-width: 50%;">
                <p style="font-size:0.75rem; opacity:0.5; margin: 0; text-transform: uppercase; letter-spacing: 0.05em;">Créateur</p>
                <p style="font-size:0.95rem; margin: 0; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; color: var(--white); font-weight: 500;">${s.authorName}</p>
              </div>
              <div style="display: flex; align-items: center; gap: 8px;">
                <div style="display: flex; align-items: center; gap: 6px; background: rgba(255,255,255,0.05); padding: 6px 10px; border-radius: 20px;" title="Nombre d'articles">
                  <svg viewBox="0 0 24 24" width="14" height="14" stroke="white" stroke-width="2" fill="none" stroke-linecap="round" stroke-linejoin="round"><path d="M21 16V8a2 2 0 0 0-1-1.73l-7-4a2 2 0 0 0-2 0l-7 4A2 2 0 0 0 3 8v8a2 2 0 0 0 1 1.73l7 4a2 2 0 0 0 2 0l7-4A2 2 0 0 0 21 16z"></path><polyline points="3.27 6.96 12 12.01 20.73 6.96"></polyline><line x1="12" y1="22.08" x2="12" y2="12"></line></svg>
                  <span style="font-size:0.85rem; font-weight: 600; color: white;">${itemCount}</span>
                </div>
                <div style="display: flex; align-items: center; gap: 6px; background: rgba(255,255,255,0.05); padding: 6px 10px; border-radius: 20px;" title="Nombre de likes">
                  <svg viewBox="0 0 24 24" width="14" height="14" stroke="#ff4b4b" stroke-width="2" fill="none"><path d="M20.84 4.61a5.5 5.5 0 0 0-7.78 0L12 5.67l-1.06-1.06a5.5 5.5 0 0 0-7.78 7.78l1.06 1.06L12 21.23l7.78-7.78 1.06-1.06a5.5 5.5 0 0 0 0-7.78z"></path></svg>
                  <span style="font-size:0.85rem; font-weight: 600; color: white;">${s.likes_count || 0}</span>
                </div>
                <div class="spread-card-arrow" style="margin: 0; margin-left: 4px;">
                  <svg viewBox="0 0 24 24" fill="none">
                    <path d="M5 12h14M12 5l7 7-7 7" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/>
                  </svg>
                </div>
              </div>
            </div>
          </a>
        `;
      });
    }
    
    document.getElementById('search-spreadsheets')?.addEventListener('input', renderSpreadsheets);
    document.getElementById('sort-spreadsheets')?.addEventListener('change', renderSpreadsheets);
  </script>
  
  <!-- View Logic (s'exécute si on est sur un /slug) -->
</body>
</html>
