<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />

  <link rel="icon" href="/assets/img/favicon.png" type="image/png" />
  <title>Spreadsheets | Mahé Brizion</title>
  <meta name="description" content="Liste des spreadsheets et sélections." />
  <meta name="robots" content="noindex, nofollow" />

  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Syne:wght@400;500;700;800&family=Inter:wght@300;400;500;600&display=swap" rel="stylesheet" />

  <link rel="stylesheet" href="/assets/css/main.css" />
  
  <style>
    .spreadsheet-hero {
      position: relative;
      padding: clamp(100px, 15vw, 180px) clamp(24px, 5vw, 80px) clamp(60px, 8vw, 100px);
      text-align: center;
      overflow: hidden;
      min-height: 40vh;
      display: flex;
      flex-direction: column;
      justify-content: center;
      align-items: center;
      z-index: 2;
    }

    .spreadsheet-title {
      font-family: var(--font-d);
      font-size: clamp(3.5rem, 10vw, 7rem);
      font-weight: 800;
      line-height: 1.05;
      letter-spacing: -0.03em;
      margin-bottom: 24px;
      color: var(--white);
    }
    
    .spreadsheet-title .accent {
      color: var(--accent);
    }

    .shoes-grid {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(350px, 1fr));
      gap: 30px;
      padding: 0 clamp(24px, 5vw, 80px) clamp(100px, 10vw, 160px);
      max-width: 1360px;
      margin: 0 auto;
      position: relative;
      z-index: 2;
    }

    .spread-card {
      background: rgba(255, 255, 255, 0.02);
      border: 1px solid rgba(255, 255, 255, 0.06);
      border-radius: 12px;
      padding: 40px 32px;
      transition: all 0.4s var(--ease-out);
      position: relative;
      overflow: hidden;
      display: flex;
      flex-direction: column;
      text-decoration: none;
      backdrop-filter: blur(10px);
    }

    .spread-card::before {
      content: "";
      position: absolute;
      top: 0; left: 0; width: 100%; height: 100%;
      background: radial-gradient(circle at top right, rgba(200, 255, 87, 0.1), transparent 50%);
      opacity: 0;
      transition: opacity 0.5s var(--ease-out);
      pointer-events: none;
    }

    .spread-card:hover {
      transform: translateY(-8px);
      border-color: rgba(200, 255, 87, 0.3);
      background: rgba(255, 255, 255, 0.04);
      box-shadow: 0 20px 40px rgba(0, 0, 0, 0.4), 0 0 20px rgba(200, 255, 87, 0.05);
    }

    .spread-card:hover::before {
      opacity: 1;
    }

    .spread-card-title {
      font-family: var(--font-d);
      font-size: 2rem;
      font-weight: 800;
      color: var(--white);
      margin-bottom: 16px;
      line-height: 1.1;
      letter-spacing: -0.02em;
    }

    .spread-card-desc {
      font-size: 1rem;
      color: var(--grey-4);
      line-height: 1.7;
      margin-bottom: 30px;
    }

    .spread-card-arrow {
      margin-top: auto;
      align-self: flex-start;
      color: var(--accent);
      background: rgba(200, 255, 87, 0.1);
      width: 44px; height: 44px;
      border-radius: 50%;
      display: flex; justify-content: center; align-items: center;
      transition: all 0.3s var(--ease-out);
    }

    .spread-card:hover .spread-card-arrow {
      background: var(--accent);
      color: var(--black);
      transform: rotate(-45deg);
    }

    .spread-card-arrow svg {
      width: 20px; height: 20px;
    }

    /* ambient background for spreadsheet */
    .spread-ambient {
      position: fixed;
      inset: 0;
      pointer-events: none;
      z-index: 0;
      overflow: hidden;
    }
    .spread-orb-1 {
      position: absolute;
      width: 60vw;
      height: 60vw;
      top: -20%;
      left: -10%;
      background: radial-gradient(circle, rgba(200, 255, 87, 0.05) 0, transparent 60%);
      filter: blur(80px);
      border-radius: 50%;
    }
    .spread-orb-2 {
      position: absolute;
      width: 50vw;
      height: 50vw;
      bottom: -10%;
      right: -10%;
      background: radial-gradient(circle, rgba(200, 255, 87, 0.03) 0, transparent 60%);
      filter: blur(80px);
      border-radius: 50%;
    }

    /* Mobile Optimization for Spreadsheet Index */
    @media (max-width: 600px) {
      .spreadsheet-hero {
        padding: clamp(80px, 12vw, 120px) 20px clamp(40px, 8vw, 60px);
        min-height: 30vh;
      }
      .shoes-grid {
        grid-template-columns: 1fr;
        padding: 0 16px clamp(60px, 10vw, 100px);
        gap: 20px;
      }
      .spread-card {
        padding: 30px 24px;
      }
      .spread-card-title {
        font-size: 1.5rem;
      }
      .spread-card-desc {
        font-size: 0.95rem;
      }
    }
  </style>
</head>
<body data-barba="wrapper">
  <!-- GRAIN & CURSOR (Garage Alpin style) -->
  <div id="grain" aria-hidden="true"></div>
  <div id="cursor-dot" aria-hidden="true"></div>
  <div id="cursor-ring" aria-hidden="true"></div>

  <div class="spread-ambient" aria-hidden="true">
    <div class="spread-orb-1"></div>
    <div class="spread-orb-2"></div>
    <div class="hero-grid" aria-hidden="true"></div>
  </div>

  <header role="banner">
    <nav id="nav" aria-label="Navigation principale" class="visible">
      <div class="wrap nav-row">
        <a href="/" class="nav-logo" aria-label="Retour à l'accueil">MB</a>
        <ul class="nav-links" role="list">
          <li role="listitem"><a href="/">Accueil</a></li>
          <li role="listitem"><a href="/spreadsheet" class="on">Spreadsheets</a></li>
        </ul>
        <div class="nav-right">
          <div class="nav-status" role="status">
            <span class="nav-dot" aria-hidden="true"></span>
            <span>Disponible</span>
          </div>
        </div>
      </div>
    </nav>
  </header>

  <main id="main-content">
    <section class="spreadsheet-hero">
      <p class="s-label reveal on" data-num="01" aria-hidden="true">Index</p>
      <h1 class="spreadsheet-title reveal on reveal-d1">Les <span class="accent">Spreadsheets</span></h1>
    </section>

    <div class="shoes-grid reveal on reveal-d2" id="public-spreadsheets-list">
      <!-- Rempli dynamiquement par JS -->
      <p style="color:var(--text-muted); text-align:center;">Chargement des spreadsheets...</p>
    </div>
  </main>

  <footer role="contentinfo" style="position: relative; z-index: 2;">
    <div class="wrap footer-row" style="border-top: 1px solid rgba(255,255,255,0.06); padding-top: 28px;">
      <p class="footer-copy">
        &copy; 2026 <span>Mahé Brizion</span> — Développeur iOS &amp; Sysadmin en Savoie
      </p>
    </div>
  </footer>

  <script src="/assets/js/main.js" defer></script>
  
  <!-- Supabase & Auth -->
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <script src="/spreadsheet/supabase-config.js"></script>
  <script src="/spreadsheet/auth-modal.js" defer></script>

  <!-- Load Public Spreadsheets -->
  <script>
    document.addEventListener('DOMContentLoaded', async () => {
      // Si on est sur une page spreadsheet individuelle (le slug n'est pas vide et pas 'spreadsheet' ni 'index.html'), 
      // view.js s'occupera du rendu. Ici on ne charge la liste que si on est sur l'index.
      const pathParts = window.location.pathname.split('/').filter(Boolean);
      const isIndex = pathParts.length === 1 && pathParts[0] === 'spreadsheet' || window.location.pathname.endsWith('index.html');
      
      if (!isIndex) return;

      const container = document.getElementById('public-spreadsheets-list');
      if (!window.supabaseClient) {
        container.innerHTML = '<p style="color:red; text-align:center;">Erreur: Supabase non initialisé.</p>';
        return;
      }

      const { data, error } = await window.supabaseClient
        .from('spreadsheets')
        .select('*')
        .eq('visibility', 'public')
        .order('created_at', { ascending: false });

      // Manual join to avoid Supabase PostgREST ambiguity
      const { data: profilesData } = await window.supabaseClient.from('profiles').select('id, email');
      if (data && profilesData) {
        data.forEach(s => {
          const ownerProfile = profilesData.find(p => p.id === s.owner_id);
          s.profiles = ownerProfile ? { email: ownerProfile.email } : null;
        });
      }

      if (error) {
        container.innerHTML = '<p style="color:red; text-align:center;">Erreur de chargement : ' + error.message + '</p>';
      } else if (data && data.length > 0) {
        container.innerHTML = '';
        data.forEach(s => {
          const author = s.profiles?.email ? s.profiles.email.split('@')[0] : 'Communauté';
          container.innerHTML += `
            <a href="/spreadsheet/${s.slug}" class="spread-card">
              <h2 class="spread-card-title">${s.title}</h2>
              <p class="spread-card-desc">${s.description || 'Une sélection au meilleur prix.'}</p>
              <p style="font-size:0.8rem; opacity:0.5; margin-top:10px;">Par ${author} • ${s.likes_count || 0} ❤️</p>
              <div class="spread-card-arrow">
                <svg viewBox="0 0 24 24" fill="none">
                  <path d="M5 12h14M12 5l7 7-7 7" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/>
                </svg>
              </div>
            </a>
          `;
        });
      } else {
        container.innerHTML = '<p style="color:var(--text-muted); text-align:center;">Aucune spreadsheet publique pour le moment.</p>';
      }
    });
  </script>
  
  <!-- View Logic (s'exécute si on est sur un /slug) -->
  <script src="/spreadsheet/view.js?v=15" defer></script>
</body>
</html>
