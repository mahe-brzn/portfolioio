<!DOCTYPE html>
<html lang="fr" dir="ltr">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />

  <title>Mon Espace | Spreadsheets</title>
  <meta name="robots" content="noindex, nofollow" />

  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Syne:wght@400;500;700;800&family=Inter:wght@300;400;500;600&display=swap" rel="stylesheet" />

  <link rel="stylesheet" href="/garagealpin/style.css" />
  <style>
    :root {
      --sneaker-accent: #c8ff57;
      --red: #c8ff57;
      --red-dim: rgba(200, 255, 87, 0.15);
      --red-glow: rgba(200, 255, 87, 0.3);
    }
    ::selection { background: var(--sneaker-accent); color: black; }
    
    body { background: var(--bg); color: var(--white); font-family: var(--font-body); }
    .hero { padding: 120px 20px 40px; text-align: center; }
    .hero-title { font-family: var(--font-title); font-size: clamp(2.5rem, 5vw, 4rem); margin-bottom: 20px; }
    .accent { color: var(--sneaker-accent); }
    
    .profile-nav { display: flex; justify-content: center; gap: 20px; margin-bottom: 40px; flex-wrap: wrap; }
    .profile-tab { background: rgba(255,255,255,0.05); border: 1px solid rgba(255,255,255,0.1); color: #fff; padding: 10px 20px; border-radius: 100px; cursor: pointer; transition: 0.3s; }
    .profile-tab.active { background: var(--sneaker-accent); color: #000; font-weight: bold; }
    
    .profile-section { display: none; max-width: 1000px; margin: 0 auto; padding: 0 20px 80px; }
    .profile-section.active { display: block; }
    
    .shoes-grid {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(300px, 1fr));
      gap: 20px;
    }

    .spread-card {
      background: rgba(255, 255, 255, 0.02);
      border: 1px solid rgba(255, 255, 255, 0.06);
      border-radius: 12px;
      padding: 30px;
      text-decoration: none;
      color: var(--white);
      transition: transform 0.4s var(--ease), border-color 0.4s;
    }
    .spread-card:hover { transform: translateY(-8px); border-color: rgba(200,255,87,0.3); }

    .suggestion-item { background: rgba(255,255,255,0.02); border: 1px solid rgba(255,255,255,0.1); border-radius: 12px; padding: 20px; margin-bottom: 15px; display: flex; justify-content: space-between; align-items: center;}
    .badge { padding: 5px 10px; border-radius: 100px; font-size: 0.8rem; font-weight: bold; }
    .badge.pending { background: rgba(255,255,255,0.1); color: #fff; }
    .badge.approved { background: rgba(200,255,87,0.2); color: #c8ff57; }
    .badge.rejected { background: rgba(255,82,82,0.2); color: #ff5252; }

    /* Fix interactions */
    #cursor-dot, #cursor-ring, #grain, .spread-ambient, .hero-grid {
      pointer-events: none !important;
    }
  </style>
</head>
<body>
  <!-- GRAIN & CURSOR (Garage Alpin style) -->
  <div id="grain" aria-hidden="true"></div>
  <div id="cursor-dot" aria-hidden="true"></div>
  <div id="cursor-ring" aria-hidden="true"></div>

  <header role="banner">
    <nav id="nav" class="visible">
      <div class="wrap nav-row">
        <a href="/" class="nav-logo">MB</a>
        <ul class="nav-links">
          <li><a href="/">Accueil</a></li>
          <li><a href="/spreadsheet">Spreadsheets</a></li>
        </ul>
        <div class="nav-right">
          <!-- Injecté par auth-modal.js -->
        </div>
      </div>
    </nav>
  </header>

  <div class="hero">
    <h1 class="hero-title">Mon <span class="accent">Espace</span></h1>
  </div>

  <div class="profile-nav">
    <div class="profile-tab active" data-target="sec-spreadsheets">Mes Spreadsheets</div>
    <div class="profile-tab" data-target="sec-favorites">Mes Favoris</div>
    <div class="profile-tab" data-target="sec-suggestions">Mes Suggestions</div>
    <div class="profile-tab" data-target="sec-settings">Paramètres</div>
  </div>

  <!-- MES SPREADSHEETS -->
  <section class="profile-section active" id="sec-spreadsheets">
    <h2 style="margin-bottom:20px; font-family:var(--font-display);">Mes Créations / Copies</h2>
    <div class="shoes-grid" id="my-spreadsheets-list">
      <p style="color:var(--text-muted);">Chargement...</p>
    </div>
  </section>

  <!-- MES FAVORIS -->
  <section class="profile-section" id="sec-favorites">
    <h2 style="margin-bottom:20px; font-family:var(--font-display);">Mes Spreadsheets Favorites</h2>
    <div class="shoes-grid" id="my-favorites-list">
      <p style="color:var(--text-muted);">Chargement...</p>
    </div>
  </section>

  <!-- MES SUGGESTIONS -->
  <section class="profile-section" id="sec-suggestions">
    <h2 style="margin-bottom:20px; font-family:var(--font-display);">Mes Suggestions (Modération)</h2>
    <div class="shoes-grid" id="my-suggestions-list" style="grid-template-columns: 1fr;">
      <p style="color:var(--text-muted);">Chargement...</p>
    </div>
  </section>

  <!-- PARAMÈTRES -->
  <section class="profile-section" id="sec-settings">
    <h2 style="margin-bottom:20px; font-family:var(--font-display);">Paramètres du compte</h2>
    <div class="spread-card" style="max-width: 500px; margin: 0 auto;">
      <h3 style="margin-bottom: 20px;">Modifier mon mot de passe</h3>
      <form id="form-change-password">
        <input type="password" id="new-password" placeholder="Nouveau mot de passe" required style="width: 100%; padding: 12px; margin-bottom: 15px; background: rgba(255,255,255,0.05); border: 1px solid rgba(255,255,255,0.1); color: #fff; border-radius: 8px;" />
        <input type="password" id="confirm-password" placeholder="Confirmer le nouveau mot de passe" required style="width: 100%; padding: 12px; margin-bottom: 15px; background: rgba(255,255,255,0.05); border: 1px solid rgba(255,255,255,0.1); color: #fff; border-radius: 8px;" />
        <button type="submit" style="width: 100%; padding: 12px; background: var(--sneaker-accent); color: #000; font-weight: bold; border: none; border-radius: 8px; cursor: pointer; transition: 0.3s;">Mettre à jour</button>
        <p id="password-status" style="margin-top: 15px; font-size: 0.9rem; text-align: center;"></p>
      </form>
    </div>
  </section>

  <script src="/garagealpin/script.js" defer></script>
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <script src="/spreadsheet/supabase-config.js"></script>
  <script src="/spreadsheet/auth-modal.js" defer></script>
  
  <script>
    document.addEventListener('DOMContentLoaded', () => {
      // Tab Navigation
      const tabs = document.querySelectorAll('.profile-tab');
      const sections = document.querySelectorAll('.profile-section');
      
      tabs.forEach(tab => {
        tab.addEventListener('click', () => {
          tabs.forEach(t => t.classList.remove('active'));
          sections.forEach(s => s.classList.remove('active'));
          tab.classList.add('active');
          document.getElementById(tab.getAttribute('data-target')).classList.add('active');
        });
      });

      // Handle Password Change
      const formPwd = document.getElementById('form-change-password');
      if (formPwd) {
        formPwd.addEventListener('submit', async (e) => {
          e.preventDefault();
          const pwd1 = document.getElementById('new-password').value;
          const pwd2 = document.getElementById('confirm-password').value;
          const status = document.getElementById('password-status');
          
          if (pwd1 !== pwd2) {
            status.style.color = '#ff5252';
            status.textContent = 'Les mots de passe ne correspondent pas.';
            return;
          }
          if (pwd1.length < 6) {
            status.style.color = '#ff5252';
            status.textContent = 'Le mot de passe doit faire au moins 6 caractères.';
            return;
          }
          
          status.style.color = '#fff';
          status.textContent = 'Mise à jour en cours...';
          
          const { error } = await supabase.auth.updateUser({ password: pwd1 });
          
          if (error) {
            status.style.color = '#ff5252';
            status.textContent = 'Erreur : ' + error.message;
          } else {
            status.style.color = '#c8ff57';
            status.textContent = 'Mot de passe mis à jour avec succès !';
            formPwd.reset();
          }
        });
      }

      // Fetch Data
      setTimeout(async () => {
        if (!window.currentUser) {
          window.location.href = '/spreadsheet';
          return;
        }

        const supabase = window.supabaseClient;

        // 1. My Spreadsheets
        const { data: mySheets } = await supabase.from('spreadsheets').select('*').eq('owner_id', window.currentUser.id);
        const mySheetsList = document.getElementById('my-spreadsheets-list');
        if (mySheets && mySheets.length > 0) {
          mySheetsList.innerHTML = '';
          mySheets.forEach(s => {
            mySheetsList.innerHTML += `
              <a href="/spreadsheet/${s.slug}" class="spread-card" style="position:relative;">
                <span class="badge" style="position:absolute; top:20px; right:20px; background:rgba(255,255,255,0.1);">${s.visibility}</span>
                <h3 style="font-family:var(--font-display); font-size:1.5rem; margin-bottom:10px;">${s.title}</h3>
                <p style="opacity:0.6; font-size:0.9rem;">${s.description || ''}</p>
              </a>
            `;
          });
        } else {
          mySheetsList.innerHTML = '<p style="color:var(--text-muted); grid-column:1/-1;">Aucune spreadsheet créée ou dupliquée.</p>';
        }

        // 2. My Favorites
        const { data: myFavs } = await supabase.from('favorites').select('*, spreadsheets(*)').eq('user_id', window.currentUser.id);
        const myFavsList = document.getElementById('my-favorites-list');
        if (myFavs && myFavs.length > 0) {
          myFavsList.innerHTML = '';
          myFavs.forEach(f => {
            if(!f.spreadsheets) return;
            myFavsList.innerHTML += `
              <a href="/spreadsheet/${f.spreadsheets.slug}" class="spread-card">
                <h3 style="font-family:var(--font-display); font-size:1.5rem; margin-bottom:10px;">${f.spreadsheets.title}</h3>
                <p style="opacity:0.6; font-size:0.9rem;">${f.spreadsheets.description || ''}</p>
              </a>
            `;
          });
        } else {
          myFavsList.innerHTML = '<p style="color:var(--text-muted); grid-column:1/-1;">Aucun favori pour le moment.</p>';
        }

        // 3. My Suggestions
        const { data: mySuggs } = await supabase.from('suggestions').select('*, spreadsheets(title)').eq('user_id', window.currentUser.id);
        const mySuggsList = document.getElementById('my-suggestions-list');
        if (mySuggs && mySuggs.length > 0) {
          mySuggsList.innerHTML = '';
          mySuggs.forEach(s => {
            mySuggsList.innerHTML += `
              <div class="suggestion-item">
                <div>
                  <h4 style="margin-bottom:5px;">${s.title}</h4>
                  <p style="font-size:0.85rem; color:var(--text-muted);">Proposé pour : ${s.spreadsheets?.title || 'Spreadsheet inconnue'} — ${new Date(s.created_at).toLocaleDateString()}</p>
                </div>
                <span class="badge ${s.status}">${s.status === 'pending' ? 'En attente' : s.status === 'approved' ? 'Approuvé' : 'Rejeté'}</span>
              </div>
            `;
          });
        } else {
          mySuggsList.innerHTML = '<p style="color:var(--text-muted);">Aucune suggestion envoyée.</p>';
        }

      }, 1000);
    });
  </script>
</body>
</html>
